<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Guti - Ultimate Tic-Tac-Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu, .game-screen {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .difficulty-btn {
            display: block;
            width: 250px;
            margin: 1.5rem auto;
            padding: 1.2rem 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .normal-mode {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .normal-mode:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(76, 175, 80, 0.4);
        }

        .devil-mode {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
        }

        .devil-mode:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(244, 67, 54, 0.4);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 8px;
            margin: 2rem auto;
            justify-content: center;
        }

        .cell {
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .cell.x {
            color: #2196F3;
            text-shadow: 2px 2px 4px rgba(33, 150, 243, 0.5);
        }

        .cell.o {
            color: #FF5722;
            text-shadow: 2px 2px 4px rgba(255, 87, 34, 0.5);
        }

        .status {
            font-size: 1.8rem;
            margin: 2rem 0;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #2196F3, #1976D2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(33, 150, 243, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #9E9E9E, #757575);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(158, 158, 158, 0.4);
        }

        .winner-message {
            font-size: 2.5rem;
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 2.5rem;
            }
            
            .game-board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
            }
            
            .cell {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Menu -->
        <div id="mainMenu" class="menu">
            <h1 class="title">3 Guti</h1>
            <p style="font-size: 1.2rem; margin-bottom: 2rem;">Choose your challenge!</p>
            <button class="difficulty-btn normal-mode" onclick="startGame('normal')">
                🟢 Normal Mode
            </button>
            <button class="difficulty-btn devil-mode" onclick="startGame('devil')">
                🔥 Devil Mode
            </button>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="game-screen hidden">
            <h2 id="gameTitle" class="title">3 Guti Battle</h2>
            <div id="status" class="status">Your turn (X)</div>
            <div id="winnerMessage" class="winner-message hidden"></div>
            <div id="gameBoard" class="game-board"></div>
            <div class="game-controls">
                <button id="playAgainBtn" class="btn btn-primary hidden" onclick="playAgain()">
                    Play Again
                </button>
                <button id="mainMenuBtn" class="btn btn-secondary hidden" onclick="goToMainMenu()">
                    Main Menu
                </button>
            </div>
        </div>
    </div>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let difficulty = 'normal';
        let aiPlayer = 'O';

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function initBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';

            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                gameBoard.appendChild(cell);
            }
            updateStatus();
            document.getElementById('playAgainBtn').classList.add('hidden');
            document.getElementById('mainMenuBtn').classList.add('hidden');
            document.getElementById('winnerMessage').classList.add('hidden');
        }

        function handleCellClick(e) {
            const index = e.target.dataset.index;
            if (board[index] !== '' || !gameActive || currentPlayer !== 'X') return;

            makeMove(index, 'X');
            if (gameActive) {
                setTimeout(aiMove, 500 + Math.random() * 500);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            document.querySelector(`[data-index="${index}"]`).textContent = player;
            document.querySelector(`[data-index="${index}"]`).classList.add(player.toLowerCase());

            if (checkWin(player)) {
                endGame(`${player === 'X' ? 'You Win! 🎉' : 'AI Wins! 😈'}`);
            } else if (board.every(cell => cell !== '')) {
                endGame('Draw! 🤝');
            } else {
                currentPlayer = player === 'X' ? 'O' : 'X';
                updateStatus();
            }
        }

        function aiMove() {
            if (!gameActive || currentPlayer !== aiPlayer) return;

            let bestMove;
            if (difficulty === 'devil') {
                bestMove = getBestMove();
            } else {
                bestMove = getRandomMove();
            }

            makeMove(bestMove, aiPlayer);
        }

        function getBestMove() {
            // Minimax algorithm for perfect play
            let bestScore = -Infinity;
            let move;
            
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = aiPlayer;
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(newBoard, depth, isMaximizing) {
            let winner = checkWinner(newBoard);
            if (winner === aiPlayer) return 10 - depth;
            if (winner === 'X') return depth - 10;
            if (winner === 'draw') return 0;

            let bestScore;
            if (isMaximizing) {
                bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === '') {
                        newBoard[i] = aiPlayer;
                        let score = minimax(newBoard, depth + 1, false);
                        newBoard[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
            } else {
                bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === '') {
                        newBoard[i] = 'X';
                        let score = minimax(newBoard, depth + 1, true);
                        newBoard[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
            }
            return bestScore;
        }

        function getRandomMove() {
            let available = [];
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') available.push(i);
            }
            return available[Math.floor(Math.random() * available.length)];
        }

        function checkWin(player) {
            return winningConditions.some(condition => {
                return condition.every(index => board[index] === player);
            });
        }

        function checkWinner(boardState) {
            if (winningConditions.some(condition => 
                condition.every(index => boardState[index] === aiPlayer))) {
                return aiPlayer;
            }
            if (winningConditions.some(condition => 
                condition.every(index => boardState[index] === 'X'))) {
                return 'X';
            }
            if (boardState.every(cell => cell !== '')) {
                return 'draw';
            }
            return null;
        }

        function updateStatus() {
            const status = document.getElementById('status');
            if (currentPlayer === 'X') {
                status.textContent = 'Your turn (X)';
            } else {
                status.textContent = `AI thinking${difficulty === 'devil' ? ' 😈' : ' 🤔'}...`;
            }
        }

        function endGame(message) {
            gameActive = false;
            document.getElementById('status').style.display = 'none';
            document.getElementById('winnerMessage').textContent = message;
            document.getElementById('winnerMessage').classList.remove('hidden');
            document.getElementById('playAgainBtn').classList.remove('hidden');
            document.getElementById('mainMenuBtn').classList.remove('hidden');
        }

        function startGame(mode) {
            difficulty = mode;
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            
            const gameTitle = document.getElementById('gameTitle');
            gameTitle.innerHTML = `3 Guti - ${mode === 'normal' ? '🟢 Normal' : '🔥 Devil'} Mode`;
            
            initBoard();
        }

        function playAgain() {
            initBoard();
            document.getElementById('status').style.display = 'block';
            document.getElementById('winnerMessage').classList.add('hidden');
            document.getElementById('playAgainBtn').classList.add('hidden');
            document.getElementById('mainMenuBtn').classList.add('hidden');
        }

        function goToMainMenu() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
        }
    </script>
</body>
</html>
